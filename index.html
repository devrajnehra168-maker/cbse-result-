<!DOCTYPE html>
<html>
<head>
<title>CBSE Result</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: white;
}

/* FORM */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOX */
.box {
    text-align: center;
}

/* LOGO */
.logo {
    width: 90px;
    margin-bottom: 10px;
}

/* HEADING */
h1 {
    font-size: 18px;
    margin-bottom: 20px;
}

/* INPUT */
input {
    padding: 10px;
    margin: 8px;
    width: 250px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    padding: 10px 25px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

/* LOADING */
#loading {
    display: none;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-size: 22px;
}

/* RESULT */
#resultPage {
    display: none;
}

.image-container {
    width: 100%;
    height: 100vh;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔥 ONLY SMALL PHONES FIX */
@media (max-width: 480px) {
    .image-container {
        overflow-x: auto;
        overflow-y: hidden;
        height: 100vh;
    }

    .image-container img {
        height: 100vh;
        width: 1600px; /* force scroll */
        object-fit: contain;
    }
}
</style>

</head>

<body>

<!-- FORM -->
<div class="container" id="login">
    <div class="box">

        <img src="cbse.png" class="logo">

        <h1>Senior School Certificate Examination (Class XII) Results 2026</h1>

        <input type="text" id="name" placeholder="Enter Name"><br>
        <input type="text" id="mother" placeholder="Mother's Name"><br>
        <input type="text" id="roll" placeholder="Roll Number"><br>

        <button onclick="check()">Submit Result</button>
    </div>
</div>

<!-- LOADING -->
<div id="loading">
    Loading Result...
</div>

<!-- RESULT IMAGE -->
<div id="resultPage">
    <div class="image-container">
        <img src="result.jpg">
    </div>
</div>

<script>
function check() {
    var name = document.getElementById("name").value;
    var mother = document.getElementById("mother").value;
    var roll = document.getElementById("roll").value;

    if(name === "Devraj Nehra" && mother === "Alka" && roll === "21682764") {

        document.getElementById("login").style.display = "none";
        document.getElementById("loading").style.display = "flex";

        setTimeout(function() {
            document.getElementById("loading").style.display = "none";
            document.getElementById("resultPage").style.display = "block";
        }, 2000);

    } else {
        alert("Invalid Details!");
    }
}
</script>

</body>
</html>
